<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>早押し — ホスト</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0d0d0f; --surface:#18181c; --border:#2a2a32;
  --accent:#f5c518; --text:#f0f0f0; --sub:#888;
  --font:'Hiragino Sans','Noto Sans JP',system-ui,sans-serif;
}
body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100dvh; display:flex; flex-direction:column; }
header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); flex-shrink:0; }
header h1 { font-size:17px; font-weight:800; color:var(--accent); }
.conn-dot { width:10px; height:10px; border-radius:50%; background:#444; transition:background .3s; }
.conn-dot.on { background:#2dc653; box-shadow:0 0 6px #2dc653; }
.phase-bar { text-align:center; padding:18px 20px 12px; flex-shrink:0; }
.phase-label { font-size:13px; color:var(--sub); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
.phase-text { font-size:22px; font-weight:800; }
.phase-text.waiting { color:var(--sub); }
.phase-text.open { color:#2dc653; }
.players-section { flex:1; overflow-y:auto; padding:0 16px 12px; }
.players-section h2 { font-size:12px; color:var(--sub); text-transform:uppercase; letter-spacing:.08em; padding:12px 4px 10px; }
.players-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.player-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 14px 12px; display:flex; flex-direction:column; gap:6px; position:relative; }
.card-rank { font-size:26px; font-weight:900; line-height:1; display:none; }
.player-card.pressed .card-rank { display:block; animation:rankPop .35s cubic-bezier(.34,1.56,.64,1); }
@keyframes rankPop { from{transform:scale(.4);opacity:0} to{transform:scale(1);opacity:1} }
.card-dot { width:10px; height:10px; border-radius:50%; }
.card-name { font-size:15px; font-weight:700; }
.card-order { font-size:12px; color:var(--sub); }
.kick-btn { position:absolute; top:8px; right:8px; background:none; border:none; color:#555; font-size:16px; cursor:pointer; padding:4px; }
.kick-btn:hover { color:#e63946; }
.empty-players { text-align:center; padding:48px 20px; color:var(--sub); font-size:14px; line-height:1.8; }
.result-bar { border-top:1px solid var(--border); flex-shrink:0; min-height:54px; display:flex; align-items:center; overflow-x:auto; scrollbar-width:none; }
.result-hint { font-size:13px; color:var(--sub); padding:0 20px; }
.result-chip { display:flex; align-items:center; gap:8px; padding:12px 16px; border-right:1px solid var(--border); flex-shrink:0; }
.result-chip:last-child { border-right:none; }
.chip-rank { font-size:20px; min-width:28px; }
.chip-dot { width:9px; height:9px; border-radius:50%; }
.chip-name { font-size:14px; font-weight:700; }
.controls { display:flex; gap:10px; padding:12px 16px 20px; flex-shrink:0; }
.ctrl-btn { flex:1; padding:16px; border:none; border-radius:14px; font-family:var(--font); font-size:16px; font-weight:800; cursor:pointer; }
.ctrl-btn.open-btn { background:#2dc653; color:#000; }
.ctrl-btn.reset-btn { background:var(--surface); color:var(--text); border:1px solid var(--border); }
.ctrl-btn:disabled { opacity:.35; pointer-events:none; }
</style>
</head>
<body>
<header>
  <h1>⚡ 早押し — ホスト</h1>
  <div class="conn-dot" id="conn-dot"></div>
</header>
<div class="phase-bar">
  <div class="phase-label">ステータス</div>
  <div class="phase-text waiting" id="phase-text">待機中</div>
</div>
<div class="players-section">
  <h2>参加プレイヤー <span id="player-count"></span></h2>
  <div class="players-grid" id="players-grid">
    <div class="empty-players" style="grid-column:1/-1">
      ゲストが参加するのを待っています<br>
      <span style="font-size:12px">ゲストのURL: <strong id="guest-url"></strong></span>
    </div>
  </div>
</div>
<div class="result-bar" id="result-bar">
  <span class="result-hint">押した順番がここに出ます</span>
</div>
<div class="controls">
  <button class="ctrl-btn open-btn" id="open-btn">受付スタート ▶</button>
  <button class="ctrl-btn reset-btn" id="reset-btn">リセット</button>
</div>
<script>
const MEDALS = ['🥇','🥈','🥉'];
const guestUrl = location.href.replace('/host','/guest');
document.getElementById('guest-url').textContent = guestUrl;
const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${proto}://${location.host}`);
const connDot = document.getElementById('conn-dot');
const phaseText = document.getElementById('phase-text');
const playersGrid = document.getElementById('players-grid');
const playerCount = document.getElementById('player-count');
const resultBar = document.getElementById('result-bar');
const openBtn = document.getElementById('open-btn');
const resetBtn = document.getElementById('reset-btn');
ws.addEventListener('open', () => { connDot.classList.add('on'); ws.send(JSON.stringify({ type:'host' })); });
ws.addEventListener('close', () => connDot.classList.remove('on'));
ws.addEventListener('message', e => { const msg = JSON.parse(e.data); if (msg.type === 'state') renderState(msg.state); });
function renderState(state) {
  const phaseMap = { waiting:'待機中', open:'受付中 🟢' };
  phaseText.textContent = phaseMap[state.phase] || state.phase;
  phaseText.className = `phase-text ${state.phase}`;
  openBtn.disabled = state.phase === 'open';
  openBtn.textContent = state.phase === 'open' ? '受付中...' : '受付スタート ▶';
  const ids = Object.keys(state.players);
  playerCount.textContent = ids.length ? `(${ids.length}人)` : '';
  if (ids.length === 0) {
    playersGrid.innerHTML = `<div class="empty-players" style="grid-column:1/-1">ゲストが参加するのを待っています<br><span style="font-size:12px">ゲストのURL: <strong>${guestUrl}</strong></span></div>`;
  } else {
    playersGrid.innerHTML = '';
    ids.forEach(id => {
      const p = state.players[id];
      const rankIdx = state.pressOrder.findIndex(r => r.id === id);
      const rank = rankIdx >= 0 ? rankIdx + 1 : null;
      const card = document.createElement('div');
      card.className = `player-card${rank ? ' pressed' : ''}`;
      card.style.borderLeftColor = p.color;
      card.style.borderLeftWidth = '3px';
      card.innerHTML = `<button class="kick-btn" data-id="${id}">✕</button>${rank ? `<div class="card-rank">${rank <= 3 ? MEDALS[rank-1] : rank+'位'}</div>` : ''}<div style="display:flex;align-items:center;gap:8px"><div class="card-dot" style="background:${p.color}"></div><div class="card-name">${esc(p.name)}</div></div>${rank ? `<div class="card-order">${rank}番目に押した</div>` : '<div class="card-order" style="color:#555">未押し</div>'}`;
      playersGrid.appendChild(card);
    });
    playersGrid.querySelectorAll('.kick-btn').forEach(btn => btn.addEventListener('click', () => ws.send(JSON.stringify({ type:'kick', id:btn.dataset.id }))));
  }
  if (state.pressOrder.length === 0) {
    resultBar.innerHTML = '<span class="result-hint">押した順番がここに出ます</span>';
  } else {
    resultBar.innerHTML = '';
    state.pressOrder.forEach((p, i) => {
      const chip = document.createElement('div');
      chip.className = 'result-chip';
      chip.innerHTML = `<span class="chip-rank">${i < 3 ? MEDALS[i] : (i+1)+'位'}</span><span class="chip-dot" style="background:${p.color}"></span><span class="chip-name">${esc(p.name)}</span>`;
      resultBar.appendChild(chip);
    });
  }
}
openBtn.addEventListener('click', () => ws.send(JSON.stringify({ type:'open' })));
resetBtn.addEventListener('click', () => ws.send(JSON.stringify({ type:'reset' })));
function esc(s) { return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
